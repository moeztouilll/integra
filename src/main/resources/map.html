<!DOCTYPE html>
<html>
<head>
    <title>OpenStreetMap Picker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .search-container {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            display: flex;
            gap: 5px;
            background: white;
            padding: 5px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input { border: 1px solid #ccc; padding: 5px; border-radius: 4px; width: 200px; }
        button { cursor: pointer; background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="addressInput" placeholder="Rechercher un lieu..." onkeypress="if(event.key === 'Enter') searchAddress()">
        <button onclick="searchAddress()">🔍</button>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([36.8065, 10.1815], 13); // Default to Tunis

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var marker = L.marker([36.8065, 10.1815], {draggable: true}).addTo(map);

        function updateJavaFX(lat, lng, address) {
            if (window.javaConnector) {
                window.javaConnector.onLocationSelected(lat, lng, address);
            }
        }

        function reverseGeocode(lat, lng) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, {
                headers: { 'User-Agent': 'INVESTI-App' }
            })
            .then(response => response.json())
            .then(data => {
                const address = data.display_name;
                updateJavaFX(lat, lng, address);
            });
        }

        marker.on('dragend', function(e) {
            var latlng = marker.getLatLng();
            reverseGeocode(latlng.lat, latlng.lng);
        });

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            reverseGeocode(e.latlng.lat, e.latlng.lng);
        });

        function searchAddress() {
            const query = document.getElementById('addressInput').value;
            if (!query) return;

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`, {
                headers: { 'User-Agent': 'INVESTI-App' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.length > 0) {
                    const result = data[0];
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    map.setView([lat, lon], 15);
                    marker.setLatLng([lat, lon]);
                    updateJavaFX(lat, lon, result.display_name);
                }
            });
        }

        // Function called from Java
        function setLocation(lat, lng, address) {
            map.setView([lat, lng], 15);
            marker.setLatLng([lat, lng]);
        }
    </script>
</body>
</html>
